{% extends 'library/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card border-danger p-4 shadow">
            <div class="card-body">
                <h3 class="text-danger mb-3">Destructive Action Alert</h3>
                <p>Are you completely sure you want to purge <strong>"{{ object.title }}"</strong> from the database registry?</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Confirm Permanent Delete</button>
                    <a href="{% url 'librarian_dashboard' %}" class="btn btn-light border">Abort</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
